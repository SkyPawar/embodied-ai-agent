version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_TTS_CREDENTIALS=${GOOGLE_TTS_CREDENTIALS}
      - AGENT_NAME=Luna
      - DEBUG=false
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - embodied-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    networks:
      - embodied-ai-network
    depends_on:
      - backend

networks:
  embodied-ai-network:
    driver: bridge
